<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&Y Society | Integrated OS</title>
    <style>
        body {
            background-color: #0d1117;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background: #161b22;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #30363d;
            font-weight: bold;
            font-size: 1.2rem;
            color: #58a6ff;
        }
        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
        }
        .user {
            align-self: flex-start;
            background: #238636;
        }
        .ai {
            align-self: flex-end;
            background: #21262d;
            border: 1px solid #30363d;
        }
        .system-msg {
            text-align: center;
            font-size: 0.8rem;
            color: #8b949e;
        }
        footer {
            padding: 20px;
            background: #161b22;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: white;
            outline: none;
        }
        button {
            padding: 10px 20px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>

<header>A&Y Society | Integrated OS v2.5</header>

<div id="chat-container">
    <div class="message ai">النظام جاهز يا عبدو. اطلب أي كود أو فكرة!</div>
</div>

<footer>
    <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="handleKey(event)">
    <button onclick="sendMessage()">إرسال</button>
</footer>

<script>
    // --- نظام تبديل المفاتيح الذكي ---
    const apiKeys = [
        "ضع_هنا_المفتاح_الأول", 
        "ضع_هنا_المفتاح_الثاني",
        "ضع_هنا_المفتاح_الثالث"
    ];
    
    let currentKeyIndex = 0;

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatContainer = document.getElementById('chat-container');
        const text = input.value.trim();

        if (!text) return;

        // إضافة رسالة المستخدم للواجهة
        addMessage(text, 'user');
        input.value = '';

        try {
            const response = await callGemini(text);
            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                addMessage(data.candidates[0].content.parts[0].text, 'ai');
            } else {
                throw new Error("InvalidResponse");
            }
        } catch (error) {
            addMessage("النظام مشغول حالياً، جاري محاولة التبديل...", "system-msg");
            console.error(error);
        }
    }

    async function callGemini(prompt) {
        const key = apiKeys[currentKeyIndex];
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }]
            })
        });

        // إذا انتهى المفتاح (Error 429) ننتقل للمفتاح التالي
        if (response.status === 429 && currentKeyIndex < apiKeys.length - 1) {
            currentKeyIndex++;
            console.log("تم التبديل للمفتاح رقم: " + (currentKeyIndex + 1));
            return callGemini(prompt); // إعادة المحاولة بالمفتاح الجديد
        }

        return response;
    }

    function addMessage(text, type) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function handleKey(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
